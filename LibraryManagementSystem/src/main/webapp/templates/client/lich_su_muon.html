<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử mượn sách</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold text-primary mb-0"><i class="bi bi-journal-text me-2"></i>Lịch sử Mượn & Trả</h3>
            <a href="trang_chu.html" class="btn btn-outline-primary btn-sm rounded-pill px-3">
                <i class="bi bi-plus-lg me-1"></i> Mượn thêm sách
            </a>
        </div>

        <div class="table-responsive bg-white p-3 rounded shadow-sm">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th class="py-3">Tên sách</th>
                        <th>Ngày mượn</th>
                        <th>Hạn trả</th>
                        <th>Trạng thái</th>
                        <th>Phí phạt</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="fw-bold">Cấu trúc dữ liệu và Giải thuật</td>
                        <td>01/03/2026</td>
                        <td>15/03/2026</td>
                        <td><span class="badge rounded-pill bg-primary px-3">Đang mượn</span></td>
                        <td class="text-muted">-</td>
                    </tr>
                    <tr class="table-warning">
                        <td class="fw-bold text-danger">Hệ quản trị CSDL</td>
                        <td>10/02/2026</td>
                        <td>25/02/2026</td>
                        <td><span class="badge rounded-pill bg-danger px-3">Quá hạn</span></td>
                        <td class="text-danger fw-bold">20.000 VNĐ</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
